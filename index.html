<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Digital CX Masterclass · New Cohort</title>
<meta name="description" content="The 6-week cohort program that turns CS and CX professionals into the digital leaders their organizations can't afford to lose. New cohort begins soon." />
<link rel="stylesheet" href="assets/dcx.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--dcx-cream); font-family: var(--font-body); color: var(--dcx-ink); }
  * { box-sizing: border-box; }
  button { font-family: var(--font-body); }
  html { scroll-behavior: smooth; }
  a { color: inherit; }
  em { font-style: italic; }

  @media (max-width: 900px) {
    .grid-2 { grid-template-columns: 1fr !important; gap: 32px !important; }
    .grid-3 { grid-template-columns: 1fr !important; }
    .grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
    .nav-links { display: none !important; }
    .hero-title { font-size: clamp(36px, 9vw, 56px) !important; }
    .section-title { font-size: 32px !important; }
    .price-row { flex-direction: column !important; gap: 16px !important; }
    .price-arrow { transform: rotate(90deg); }
    .footer-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .director-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .guarantee-grid { grid-template-columns: 1fr !important; gap: 24px !important; justify-items: center; text-align: center; }
    .about-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .credentials-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .recap-grid { grid-template-columns: 1fr !important; gap: 16px !important; }
    .recap-grid > div { border-left: none !important; border-top: 1px solid rgba(255,255,255,.12); padding-top: 16px; }
    .recap-grid > div:first-child { border-top: none; padding-top: 0; }
    .padded-section { padding-left: 20px !important; padding-right: 20px !important; }
    .pad-card { padding: 32px 24px !important; }
  }
  @media (max-width: 600px) {
    .hero-pad { padding: 80px 20px 64px !important; }
    .stat-grid-4 { grid-template-columns: repeat(2, 1fr) !important; gap: 20px !important; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, Fragment } = React;

/* ----------------------------------------------------------------- ATOMS */

function Button({ variant = "primary-orange", size = "md", children, onClick, style, fullWidth }) {
  const [hover, setHover] = useState(false);
  const [press, setPress] = useState(false);
  const base = {
    fontFamily: "var(--font-body)",
    fontWeight: 600,
    fontSize: size === "xl" ? 17 : size === "lg" ? 16 : 14,
    padding: size === "xl" ? "18px 32px" : size === "lg" ? "14px 26px" : "10px 20px",
    borderRadius: 10,
    border: "1.5px solid transparent",
    cursor: "pointer",
    transition: "all 200ms cubic-bezier(.2,.8,.2,1)",
    transform: press ? "scale(.98)" : "scale(1)",
    display: "inline-flex",
    alignItems: "center",
    justifyContent: "center",
    gap: 10,
    width: fullWidth ? "100%" : "auto",
    letterSpacing: "-0.005em",
    ...style,
  };
  const variants = {
    "primary-orange": {
      background: hover ? "#D24F12" : "#FD6827",
      color: "#fff",
      boxShadow: hover ? "0 12px 32px rgba(253,104,39,.34)" : "0 6px 16px rgba(253,104,39,.18)",
    },
    "primary-green": {
      background: hover ? "#22454A" : "#2F5C61",
      color: "#fff",
      boxShadow: hover ? "0 12px 32px rgba(47,92,97,.30)" : "0 6px 16px rgba(47,92,97,.16)",
    },
    "secondary-light": {
      background: hover ? "rgba(255,255,255,.10)" : "transparent",
      color: "#fff",
      borderColor: "rgba(255,255,255,.4)",
    },
  };
  return (
    <button
      style={{ ...base, ...variants[variant] }}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => { setHover(false); setPress(false); }}
      onMouseDown={() => setPress(true)}
      onMouseUp={() => setPress(false)}
      onClick={onClick}
    >
      {children}
    </button>
  );
}

function HeroVideo() {
  // Paste your YouTube video ID below (the part after "v=" in a YouTube URL).
  const YOUTUBE_ID = "D1QBEnnJd0I";

  const [playing, setPlaying] = useState(false);
  const [hover, setHover] = useState(false);

  const frame = {
    position: "relative",
    width: "100%",
    maxWidth: 880,
    margin: "44px auto 0",
    aspectRatio: "16 / 9",
    borderRadius: 16,
    overflow: "hidden",
    border: "1px solid rgba(255,255,255,.12)",
    boxShadow: "0 30px 60px -20px rgba(0,0,0,.45)",
    background: "#1a3438",
  };

  if (playing) {
    return (
      <div style={frame}>
        <iframe
          src={`https://www.youtube.com/embed/${YOUTUBE_ID}?autoplay=1&rel=0`}
          title="Digital CX Masterclass intro"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowFullScreen
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", border: 0 }}
        />
      </div>
    );
  }

  return (
    <button
      type="button"
      aria-label="Play intro video"
      onClick={() => setPlaying(true)}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        ...frame,
        padding: 0,
        cursor: "pointer",
        display: "block",
        backgroundImage: `url(https://img.youtube.com/vi/${YOUTUBE_ID}/hqdefault.jpg)`,
        backgroundSize: "cover",
        backgroundPosition: "center",
      }}
    >
      <span style={{
        position: "absolute", inset: 0,
        background: hover
          ? "linear-gradient(180deg, rgba(0,0,0,.15) 0%, rgba(0,0,0,.45) 100%)"
          : "linear-gradient(180deg, rgba(0,0,0,.05) 0%, rgba(0,0,0,.35) 100%)",
        transition: "background .2s ease",
      }} />
      <span style={{
        position: "absolute", top: "50%", left: "50%",
        transform: `translate(-50%, -50%) scale(${hover ? 1.05 : 1})`,
        width: 80, height: 80, borderRadius: 999,
        background: "#FD6827",
        boxShadow: hover
          ? "0 16px 40px rgba(253,104,39,.55), 0 0 0 8px rgba(253,104,39,.18)"
          : "0 12px 28px rgba(0,0,0,.45)",
        display: "flex", alignItems: "center", justifyContent: "center",
        transition: "transform .2s ease, box-shadow .2s ease",
      }}>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff" aria-hidden="true">
          <path d="M8 5v14l11-7z" />
        </svg>
      </span>
    </button>
  );
}

function Eyebrow({ tone = "orange", children, style }) {
  const colors = { orange: "#FD6827", green: "#2F5C61", light: "#FE9A6B", muted: "#678480" };
  return (
    <div style={{
      fontSize: 12, letterSpacing: ".22em", textTransform: "uppercase",
      color: colors[tone], fontWeight: 700, fontFamily: "var(--font-body)",
      ...style,
    }}>{children}</div>
  );
}

function HandDrawnDeco({ opacity = 0.22, color = "#678480", strokeWidth = 2, variant = "scatter" }) {
  if (variant === "left") {
    return (
      <svg viewBox="0 0 400 600" preserveAspectRatio="xMinYMid slice" aria-hidden="true"
        style={{ position: "absolute", left: 0, top: 0, width: 400, height: "100%", opacity, pointerEvents: "none" }}>
        <g fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
          <path d="M-20 80 C 60 40, 120 140, 220 90" />
          <path d="M-20 130 C 80 100, 140 180, 240 140" />
          <path d="M-30 200 C 50 240, 130 200, 200 240" />
          <path d="M-20 360 C 80 320, 160 380, 250 340" />
          <path d="M-10 480 C 80 520, 180 460, 280 510" />
          <circle cx="60" cy="80" r="3" fill={color} stroke="none" />
          <circle cx="180" cy="540" r="3" fill={color} stroke="none" />
          <path d="M30 250 q 6 -20 18 0 q 6 20 18 0" />
        </g>
      </svg>
    );
  }
  return (
    <svg viewBox="0 0 1400 600" preserveAspectRatio="xMidYMid slice" aria-hidden="true"
      style={{ position: "absolute", inset: 0, width: "100%", height: "100%", opacity, pointerEvents: "none" }}>
      <g fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
        <path d="M-20 120 C 120 60, 240 180, 380 120 S 600 60, 740 130" />
        <path d="M60 220 C 180 280, 280 220, 360 260" />
        <path d="M1080 80 C 1180 140, 1280 90, 1400 150" />
        <path d="M1180 240 C 1240 280, 1320 260, 1380 300" />
        <path d="M-20 480 C 120 540, 280 460, 420 510" />
        <path d="M980 520 C 1100 470, 1220 530, 1380 480" />
        <path d="M620 460 q 12 -28 24 0 q 12 28 24 0 q 12 -28 24 0" />
        <circle cx="120" cy="80" r="3" fill={color} stroke="none" />
        <circle cx="1280" cy="200" r="3" fill={color} stroke="none" />
        <circle cx="220" cy="540" r="3" fill={color} stroke="none" />
        <circle cx="900" cy="100" r="3" fill={color} stroke="none" />
      </g>
    </svg>
  );
}

function NumberCard({ number, label, color = "#FD6827" }) {
  return (
    <div style={{
      background: "#fff", border: "1px solid var(--dcx-rule)",
      borderRadius: 14, padding: "32px 28px",
      boxShadow: "0 4px 12px rgba(26,31,34,.06)",
      position: "relative", overflow: "hidden",
    }}>
      <div style={{ position: "absolute", top: 0, left: 0, width: 4, height: "100%", background: color }} />
      <div style={{
        fontFamily: "Orbitron, sans-serif", fontWeight: 900,
        fontSize: 64, lineHeight: 1, color, letterSpacing: "-.02em",
      }}>{number}</div>
      <p style={{ margin: "14px 0 0", fontSize: 15, lineHeight: 1.5, color: "var(--fg-2)" }}>{label}</p>
    </div>
  );
}

/* --------------------------------------------------------------- HEADER */

function StickyHeader({ onCta }) {
  const goTo = (sel) => {
    const el = document.querySelector(sel);
    if (el) el.scrollIntoView({ behavior: "smooth" });
  };
  return (
    <header style={{
      position: "sticky", top: 0, zIndex: 50,
      background: "rgba(250,246,240,.94)", backdropFilter: "blur(10px)",
      WebkitBackdropFilter: "blur(10px)",
      borderBottom: "1px solid var(--dcx-rule)",
    }}>
      <div style={{ maxWidth: 1240, margin: "0 auto", padding: "12px 32px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <a style={{ display: "flex", alignItems: "center", gap: 12, cursor: "pointer", textDecoration: "none" }} onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}>
          <div style={{ width: 36, height: 36, borderRadius: 8, background: "#FD6827", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Orbitron, sans-serif", color: "#2F5C61", fontWeight: 900, fontSize: 12, lineHeight: .95 }}>DCX</div>
          <div>
            <div style={{ fontFamily: "Orbitron, sans-serif", fontWeight: 800, fontSize: 12, color: "var(--dcx-ink)", letterSpacing: ".02em" }}>THE DIGITAL CX</div>
            <div style={{ fontSize: 9.5, color: "#FD6827", letterSpacing: ".22em", textTransform: "uppercase", fontWeight: 700, marginTop: 1 }}>Masterclass</div>
          </div>
        </a>
        <nav className="nav-links" style={{ display: "flex", gap: 4, alignItems: "center" }}>
          {[
            { l: "What's inside", sel: "#offer" },
            { l: "Pricing", sel: "[data-screen-label^='07']" },
            { l: "About Alex", sel: "[data-screen-label^='11']" },
            { l: "FAQ", sel: "[data-screen-label^='12']" },
          ].map(it => (
            <a key={it.l} onClick={() => goTo(it.sel)} style={{ cursor: "pointer", padding: "8px 14px", borderRadius: 8, fontSize: 14, fontWeight: 500, color: "var(--fg-2)" }}>{it.l}</a>
          ))}
          <Button variant="primary-orange" size="md" onClick={onCta} style={{ marginLeft: 12 }}>Reserve seat →</Button>
        </nav>
      </div>
    </header>
  );
}

/* ---------------------------------------------------------------- HERO */

function Hero({ onCta }) {
  return (
    <section data-screen-label="01 Hero" className="hero-pad" style={{
      background: "#2F5C61", position: "relative", color: "#fff",
      padding: "120px 32px 100px", overflow: "hidden",
    }}>
      <HandDrawnDeco opacity={0.28} color="#678480" />
      <div style={{ position: "relative", maxWidth: 1080, margin: "0 auto", textAlign: "center" }}>
        <div style={{
          display: "inline-flex", alignItems: "center", gap: 10,
          padding: "8px 18px", borderRadius: 999,
          background: "rgba(253,104,39,.14)",
          border: "1px solid rgba(253,104,39,.5)",
          color: "#FE9A6B", fontSize: 13, fontWeight: 600,
          marginBottom: 28, letterSpacing: ".02em",
        }}>
          <span style={{ width: 8, height: 8, borderRadius: 999, background: "#FD6827", boxShadow: "0 0 0 4px rgba(253,104,39,.2)" }} />
          New Cohort begins soon! Seats are limited
        </div>

        <Eyebrow tone="light" style={{ marginBottom: 18 }}>The Digital CX Masterclass</Eyebrow>

        <h1 className="hero-title" style={{
          fontFamily: "Orbitron, sans-serif", fontWeight: 900,
          fontSize: "clamp(44px, 6.4vw, 92px)", lineHeight: 1.0,
          margin: 0, letterSpacing: "-.015em", color: "#fff",
          textWrap: "balance",
        }}>
          Stop reading <em style={{ fontStyle: "normal", color: "#FD6827" }}>about</em> digital&nbsp;CX.<br/>
          Start <em style={{ fontStyle: "normal", color: "#FD6827" }}>building</em> it.
        </h1>

        <div style={{ width: 120, height: 5, background: "#FD6827", margin: "32px auto 28px", borderRadius: 3 }} />

        <p style={{
          maxWidth: 720, margin: "0 auto", fontSize: 21, lineHeight: 1.5,
          color: "#DCE4E2", fontWeight: 400,
        }}>
          The 6-week cohort program that turns CS and CX professionals into the
          digital leaders their organizations can't afford to lose.
        </p>
        <p style={{
          maxWidth: 620, margin: "16px auto 0", fontSize: 16, lineHeight: 1.55,
          color: "#B8C7C4",
        }}>
          You don't need another blog post about digital transformation. You need a
          system, a strategy, and the confidence to execute both.
        </p>

        <div style={{ display: "flex", gap: 14, justifyContent: "center", marginTop: 44, flexWrap: "wrap" }}>
          <Button variant="primary-orange" size="xl" onClick={onCta}>Reserve your seat →</Button>
          <Button variant="secondary-light" size="xl" onClick={() => document.getElementById("offer")?.scrollIntoView({ behavior: "smooth" })}>See what's inside</Button>
        </div>

        <HeroVideo />

        <div className="stat-grid-4" style={{
          marginTop: 64, paddingTop: 32,
          borderTop: "1px solid rgba(255,255,255,.12)",
          display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 24,
          maxWidth: 880, marginLeft: "auto", marginRight: "auto",
        }}>
          {[
            { v: "50+", l: "Resources" },
            { v: "6 weeks", l: "Live cohort" },
            { v: "38", l: "Modules" },
            { v: "10", l: "Seats only" },
          ].map((p, i) => (
            <div key={i} style={{ textAlign: "center" }}>
              <div style={{ fontFamily: "Orbitron, sans-serif", fontWeight: 800, fontSize: 28, color: "#FD6827", lineHeight: 1 }}>{p.v}</div>
              <div style={{ fontSize: 12, color: "#B8C7C4", marginTop: 6, letterSpacing: ".08em", textTransform: "uppercase", fontWeight: 600 }}>{p.l}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* -------------------------------------------------------- PROBLEM AGITATION */

function ProblemAgitation() {
  return (
    <section data-screen-label="02 Problem" className="padded-section" style={{
      background: "var(--dcx-cream)", padding: "120px 32px",
      position: "relative", overflow: "hidden",
    }}>
      <div style={{ maxWidth: 880, margin: "0 auto" }}>
        <Eyebrow tone="orange">Sound familiar?</Eyebrow>
        <h2 className="section-title" style={{
          fontFamily: "var(--font-body)", fontWeight: 800,
          fontSize: 48, lineHeight: 1.08, letterSpacing: "-0.02em",
          margin: "16px 0 40px", color: "var(--dcx-ink)",
          textWrap: "balance",
        }}>
          You got the role. Now you're stuck in the same cycle.
        </h2>

        <div style={{ fontSize: 18, lineHeight: 1.7, color: "var(--fg-1)" }}>
          <p>Manual check-ins. Spreadsheet tracking. Reactive firefighting. You know there's a better way to run your program, but every time you try to carve out space to build it, another escalation pulls you back in.</p>

          <p>Meanwhile, the industry is moving. AI announcements every week. New tools. New expectations from leadership. And you're sitting there thinking:</p>

          <blockquote style={{
            margin: "28px 0", padding: "20px 28px",
            borderLeft: "4px solid #FD6827",
            background: "#fff", borderRadius: "0 12px 12px 0",
            fontSize: 22, lineHeight: 1.4, fontWeight: 600,
            color: "var(--dcx-dark-green)", fontStyle: "italic",
          }}>
            "I should be further along by now."
          </blockquote>

          <p>Maybe you just stepped into a digital CS role and you're realizing nobody handed you a playbook. You're supposed to "build a digital program", but what does that actually mean? Where do you start? How do you structure it? How do you sell it internally? How do you make it actually work for the customer?</p>

          <p>Or maybe you're a senior leader watching your org fall behind. You've got smart people on your team, but they don't have the frameworks to move fast enough. You need them upskilled, and you need it to happen in weeks, not quarters.</p>

          <p>Here's the uncomfortable truth: self-study isn't going to cut it. You can read the two books that exist on this topic. You can listen to podcasts on your commute and hope something sticks. You can go to a conference and sit through one or two digital CX sessions sandwiched between 40 other talks.</p>

          <p style={{ color: "var(--fg-2)" }}>None of that gives you a complete, actionable system.</p>
        </div>

        <div className="pad-card" style={{
          marginTop: 64, padding: "48px 56px",
          background: "var(--dcx-dark-green)", borderRadius: 18,
          color: "#fff", textAlign: "center",
          position: "relative", overflow: "hidden",
        }}>
          <HandDrawnDeco opacity={0.18} color="#678480" />
          <div style={{ position: "relative" }}>
            <div style={{ fontSize: 13, letterSpacing: ".22em", textTransform: "uppercase", color: "#FE9A6B", fontWeight: 700, marginBottom: 18 }}>The diagnosis</div>
            <p style={{
              fontFamily: "Orbitron, sans-serif", fontWeight: 700,
              fontSize: "clamp(26px, 4vw, 40px)", lineHeight: 1.15, margin: 0,
              letterSpacing: "-.01em", textWrap: "balance",
            }}>
              You don't have a knowledge problem.<br/>
              You have a <span style={{ color: "#FD6827" }}>structure problem</span>.
            </p>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ------------------------------------------------------- FAILED SOLUTIONS */

function FailedSolutions() {
  const items = [
    { title: "Self-study from books and blogs", body: "There are a handful of decent resources out there, but they're scattered, surface-level, and none of them take you from strategy to execution in a single, structured path. You end up with a collection of interesting ideas and no implementation plan.", cost: "Months of reading, no plan" },
    { title: "Conference sessions", body: "You paid $2,000+ in registration and travel to attend a conference where digital CX got maybe 2-3 breakout sessions out of 50. You took some notes. You came back energized. Two weeks later, nothing changed.", cost: "$2,000+ · 2 weeks of momentum" },
    { title: "Internal training programs", body: "Your company's L&D team means well, but they're generalists. They don't know the difference between digital CS and scaled CS (most people in the industry still confuse them). The training doesn't go deep enough to be useful.", cost: "Generic, surface-level" },
    { title: "Copying what someone else did", body: "You read a case study or saw a talk about how Company X built their digital program. You tried to replicate it. It didn't work because their ICP, data maturity, tech stack, and org structure are nothing like yours.", cost: "A pattern, not a system" },
    { title: "Trial and error", body: "The most expensive approach of all. You're burning months, sometimes years, figuring out through painful iteration what could be learned in weeks with the right framework.", cost: "12-18 months · credibility" },
  ];
  return (
    <section data-screen-label="03 Failed Solutions" className="padded-section" style={{ background: "#fff", padding: "120px 32px" }}>
      <div style={{ maxWidth: 1180, margin: "0 auto" }}>
        <div style={{ maxWidth: 760, marginBottom: 56 }}>
          <Eyebrow tone="orange">What hasn't worked</Eyebrow>
          <h2 className="section-title" style={{
            fontFamily: "var(--font-body)", fontWeight: 800,
            fontSize: 48, lineHeight: 1.08, letterSpacing: "-0.02em",
            margin: "16px 0 20px", color: "var(--dcx-ink)", textWrap: "balance",
          }}>
            You've tried this before.
          </h2>
          <p style={{ margin: 0, fontSize: 18, lineHeight: 1.6, color: "var(--fg-2)" }}>
            If you've been trying to figure out digital CX on your own, you've probably tried some version of these, and watched them all fall short for the same underlying reason.
          </p>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 20 }}>
          {items.map((it, i) => (
            <div key={i} style={{
              background: "var(--dcx-cream)",
              border: "1px solid var(--dcx-rule)",
              borderRadius: 14, padding: "28px 26px",
              display: "flex", flexDirection: "column", gap: 14,
              position: "relative",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{
                  width: 32, height: 32, borderRadius: 8,
                  background: "#fff", border: "1px solid var(--dcx-rule)",
                  display: "inline-flex", alignItems: "center", justifyContent: "center",
                  fontFamily: "Orbitron, sans-serif", fontWeight: 800, fontSize: 14,
                  color: "#678480",
                }}>0{i+1}</span>
                <div style={{
                  fontSize: 11, letterSpacing: ".18em", textTransform: "uppercase",
                  color: "#B95B2D", fontWeight: 700,
                }}>✕ Doesn't work</div>
              </div>
              <h3 style={{
                fontFamily: "var(--font-body)", fontWeight: 700,
                fontSize: 20, lineHeight: 1.25, margin: 0,
                color: "var(--dcx-ink)",
              }}>{it.title}</h3>
              <p style={{ margin: 0, fontSize: 14, lineHeight: 1.6, color: "var(--fg-2)" }}>{it.body}</p>
              <div style={{
                marginTop: "auto", paddingTop: 14,
                borderTop: "1px dashed var(--dcx-rule)",
                fontSize: 12, color: "#B95B2D", fontWeight: 600,
                letterSpacing: ".04em",
              }}>The cost: {it.cost}</div>
            </div>
          ))}
        </div>

        <div style={{
          marginTop: 56, padding: "36px 40px",
          borderRadius: 14, background: "var(--dcx-dark-green)",
          color: "#fff", display: "flex", gap: 24, alignItems: "center",
          flexWrap: "wrap",
        }}>
          <div style={{
            fontFamily: "Orbitron, sans-serif", fontWeight: 800, fontSize: 22,

/* ----------------------------------------------------- FLOATING CTA CARD */

function FloatingCta({ onCta }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const onScroll = () => setVisible(window.scrollY > 600);
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  if (!visible) return null;
  return (
    <div style={{
      position: "fixed", bottom: 24, right: 24, zIndex: 40,
      background: "#fff", borderRadius: 14,
      boxShadow: "0 12px 32px rgba(26,31,34,.18)",
      padding: 14, display: "flex", gap: 12, alignItems: "center",
      border: "1px solid var(--dcx-rule)", maxWidth: 360,
      animation: "fadeUp 320ms cubic-bezier(.2,.8,.2,1)",
    }}>
      <div style={{ width: 8, height: 8, borderRadius: 999, background: "#FD6827", boxShadow: "0 0 0 4px rgba(253,104,39,.2)", flexShrink: 0 }} />
      <div style={{ fontSize: 12.5, lineHeight: 1.4, color: "var(--fg-2)", flex: 1 }}>
        <strong style={{ color: "var(--dcx-ink)" }}>This cohort · 10 seats</strong><br/>
        Begins soon · $1,495
      </div>
      <Button variant="primary-orange" size="md" onClick={onCta}>Reserve →</Button>
    </div>
  );
}
