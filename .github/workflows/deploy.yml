name: Deploy via SFTP

# Runs on every push to main, and can also be triggered manually
# from the repo's "Actions" tab (Run workflow).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server over SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          # Upload everything in the repo EXCEPT hidden files/folders.
          # The ./* glob skips dotfiles, so .git, .github, .claude and
          # .gitignore are never uploaded to the server.
          local_path: './*'
          # The folder on your server that maps to /masterclass/
          # (set via the FTP_SERVER_DIR secret, ends with a slash).
          remote_path: ${{ secrets.FTP_SERVER_DIR }}
          # Leave existing server files alone if they aren't in the repo.
          delete_remote_files: false
