name: Deploy to FTP

# Runs on every push to main, and can also be triggered manually
# from the repo's "Actions" tab (Run workflow).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # FTPS is secure (encrypts the connection). If your host only
          # supports plain FTP, change the next line to: protocol: ftp
          protocol: ftps
          # The folder on your server that maps to /masterclass/
          # (set via the FTP_SERVER_DIR secret, must end with a slash).
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Files in the repo that should NOT be uploaded to the server.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            .gitignore
            CHANGELOG.md
            README.md
